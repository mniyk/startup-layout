name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: cargo install --locked dioxus-cli

      - name: Build
        run: dx bundle --release --platform desktop

      - name: Package
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path target -Filter "*.zip" -Recurse |
            Where-Object { $_.FullName -match "dx" } |
            Select-Object -First 1
          if (-not $zip) { throw "bundle zip not found" }
          Copy-Item $zip.FullName -Destination "startup-layout-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: startup-layout-windows-x86_64.zip
          path: startup-layout-windows-x86_64.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
